name: Update Dynamic Content

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC (10:00 PHT) — runs daily, commits only on year rollover
  workflow_dispatch:

jobs:
  update-year:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Update current year in README
        run: |
          python3 << 'EOF'
          import re, datetime, sys

          current_year = datetime.date.today().year
          print(f'Current year: {current_year}')

          with open('README.md', 'r', encoding='utf-8') as f:
              content = f.read()

          updated = re.sub(
              r'<!--CURRENT_YEAR-->\d{4}<!--/CURRENT_YEAR-->',
              f'<!--CURRENT_YEAR-->{current_year}<!--/CURRENT_YEAR-->',
              content
          )

          if updated == content:
              print('No change — year is already up to date.')
              sys.exit(0)

          with open('README.md', 'w', encoding='utf-8') as f:
              f.write(updated)

          print(f'README updated to year {current_year}.')
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md \
            || (git add README.md \
            && git commit -m "chore: update year to $(date +%Y)" \
            && git push)
