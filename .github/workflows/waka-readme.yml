name: Waka Readme

on:
  schedule:
    # Guaranteed runs — 4x daily (always execute)
    - cron: '30 0 * * *'    # 08:30 PHT
    - cron: '30 6 * * *'    # 14:30 PHT
    - cron: '30 12 * * *'   # 20:30 PHT
    - cron: '30 18 * * *'   # 02:30 PHT (+1)
    # Optional runs — 6 slots, each has 50% chance of executing
    # Expected additional runs: ~3 · Total range: 4–10 per day
    - cron: '30 2 * * *'    # 10:30 PHT
    - cron: '30 4 * * *'    # 12:30 PHT
    - cron: '30 8 * * *'    # 16:30 PHT
    - cron: '30 10 * * *'   # 18:30 PHT
    - cron: '30 14 * * *'   # 22:30 PHT
    - cron: '30 20 * * *'   # 04:30 PHT (+1)
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - name: Randomize optional runs
        run: |
          OPTIONAL="30 2 * * *|30 4 * * *|30 8 * * *|30 10 * * *|30 14 * * *|30 20 * * *"
          SCHEDULE="${{ github.event.schedule }}"
          if echo "$OPTIONAL" | tr '|' '\n' | grep -qxF "$SCHEDULE"; then
            if [ $((RANDOM % 2)) -eq 0 ]; then
              echo "SKIP_RUN=true" >> $GITHUB_ENV
              echo "::notice::Optional slot — skipping this run"
            else
              echo "::notice::Optional slot — proceeding"
            fi
          else
            echo "::notice::Guaranteed slot — proceeding"
          fi

      - uses: actions/checkout@v3
        if: env.SKIP_RUN != 'true'
        with:
          token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Configure Git
        if: env.SKIP_RUN != 'true'
        run: |
          git config --local user.email "${{ secrets.GIT_EMAIL }}"
          git config --local user.name "${{ secrets.GIT_NAME }}"

      - uses: anmol098/waka-readme-stats@master
        if: env.SKIP_RUN != 'true'
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
          SHOW_LINES_OF_CODE: "False"
          SHOW_PROFILE_VIEWS: "False"
          SHOW_COMMIT: "False"
          SHOW_DAYS_OF_WEEK: "False"
          SHOW_LANGUAGE: "True"
          SHOW_OS: "False"
          SHOW_PROJECTS: "False"
          SHOW_TIMEZONE: "False"
          SHOW_EDITORS: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_LOC_CHART: "False"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_TOTAL_CODE_TIME: "True"
          SHOW_UPDATED_DATE: "False"
          COMMIT_BY_ME: "True"
          COMMIT_USERNAME: ${{ secrets.GIT_NAME }}
          COMMIT_EMAIL: ${{ secrets.GIT_EMAIL }}
